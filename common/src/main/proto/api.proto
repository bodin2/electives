syntax = "proto3";

package th.ac.bodin2.electives.proto.api;

option java_multiple_files = true;
option java_package = "th.ac.bodin2.electives.proto.api";

message AdminService {
  message ChallengeResponse {
    string challenge = 1;
  }

  message ListUsersResponse {
    repeated User users = 1;
    uint32 total = 2;
  }

  message ListGroupsResponse {
    repeated Group groups = 1;
  }

  message ListEnrollmentsEnrolledCounts {
    map<uint32, Counts> counts = 1;

    message Counts {
      uint32 selected = 1;
      uint32 total = 2;
    }
  }

  message AddUserRequest {
    User user = 1;
    string password = 2;
    // Students: IDs of CUSTOM-typed groups to add the student to.
    // Teachers: IDs of groups (any type) to add the teacher to.
    repeated uint32 group_ids = 3;
    // Students-only: ID of the group with type GRADE the student belongs to (required).
    optional uint32 grade_id = 4;
    // Students-only: ID of the group with type ROOM the student belongs to (required).
    optional uint32 room_id = 5;
    // Students-only: ID of the group with type PROGRAM the student belongs to (optional).
    optional uint32 program_id = 6;
  }

  message BulkAddUsersRequest {
    repeated AddUserRequest values = 1;
  }

  message BulkDeleteUsersRequest {
    repeated uint32 user_ids = 1;
  }

  message SetEnrollmentSubjectsRequest {
    repeated uint32 subject_ids = 1;
  }

  message SetStudentSelectionsRequest {
    // Enrollment ID -> Subject ID
    map<uint32, uint32> selections = 1;
  }

  message UserPatch {
    optional string first_name = 1;
    optional string middle_name = 2;
    optional string last_name = 3;
    // Students-only: IDs of CUSTOM-typed groups to replace the student's current CUSTOM-typed memberships with.
    // Teachers: IDs of groups (any type) to replace the teacher's current memberships with.
    repeated uint32 groups = 4;
    optional string avatar_url = 5;
    optional string new_password = 6;

    // Whether the `groups` field should be considered during patching.
    bool patch_groups = 7;
    // Whether the `middle_name` field should be considered during patching.
    bool patch_middle_name = 8;
    // Whether the `last_name` field should be considered during patching.
    bool patch_last_name = 9;
    // Whether the `avatar_url` field should be considered during patching.
    bool patch_avatar_url = 10;

    // Mr. Ms. Dr. etc.
    optional string prefix = 11;
    // Whether the `prefix` field should be considered during patching.
    bool patch_prefix = 12;

    // Students-only: New GRADE group ID for the student.
    optional uint32 grade_id = 13;
    // Students-only: New ROOM group ID for the student.
    optional uint32 room_id = 14;
    // Students-only: New PROGRAM group ID for the student. PROGRAM is optional;
    // to clear an existing PROGRAM membership, set `patch_program_id = true` and
    // leave `program_id` unset.
    optional uint32 program_id = 15;
    // Whether the `program_id` field should be considered during patching.
    // When true and `program_id` is unset, the student's PROGRAM membership is cleared.
    bool patch_program_id = 16;
  }

  message GroupPatch {
    optional string name = 1;
  }

  message EnrollmentPatch {
    optional string name = 1;
    /**
     * Unix timestamp representing the start date of the selection period.
     * If not set, the selection period should be treated as started.
     */
    optional uint64 start_date = 2;
    /**
     * Unix timestamp representing the end date of the selection period.
     * If not set, the selection period should be treated as indefinite.
     */
    optional uint64 end_date = 3;
    optional uint32 group_id = 4;

    // Whether the `start_date` field should be considered during patching.
    bool patch_start_date = 5;
    // Whether the `end_date` field should be considered during patching.
    bool patch_end_date = 6;
    // Whether the `group_id` field should be considered during patching.
    bool patch_group_id = 7;
  }

  message SubjectPatch {
    optional string name = 1;
    optional string description = 2;
    optional string code = 3;
    optional SubjectTag tag = 4;
    optional string location = 5;
    optional uint32 capacity = 6;
    optional uint32 group_id = 7;
    repeated uint32 teachers = 8;
    optional string thumbnail_url = 9;
    optional string image_url = 10;

    // Whether the `description` field should be considered during patching.
    bool patch_description = 11;
    // Whether the `code` field should be considered during patching.
    bool patch_code = 12;
    // Whether the `location` field should be considered during patching.
    bool patch_location = 13;
    // Whether the `group_id` field should be considered during patching.
    bool patch_group_id = 14;
    // Whether the `teachers` field should be considered during patching.
    bool patch_teachers = 15;
    // Whether the `thumbnail_url` field should be considered during patching.
    bool patch_thumbnail_url = 16;
    // Whether the `image_url` field should be considered during patching.
    bool patch_image_url = 17;

    // Enrollment ID to update teachers for (required if `patch_teachers` is true)
    optional uint32 enrollment_id = 18;
  }

  message GroupMemberCounts {
    map<uint32, uint32> member_counts = 1;
  }

  message SubjectEnrollmentIds {
    repeated uint32 enrollment_ids = 1;
  }
}

message AuthService {
  message AuthenticateRequest {
    uint32 id = 1;
    string password = 2;
    string client_name = 3;
  }

  message AuthenticateResponse {
    string token = 1;
  }
}

message EnrollmentsService {
  message ListResponse {
    repeated Enrollment enrollments = 1;
  }

  message ListSubjectsResponse {
    repeated Subject subjects = 1;
  }

  message ListSubjectMembersResponse {
    repeated User teachers = 1;
    repeated User students = 2;
  }
}

message UsersService {
  message StudentSelections {
    // Enrollment ID -> Subject
    map<uint32, Subject> subjects = 1;
  }

  message SetStudentEnrollmentSelectionRequest {
    uint32 subject_id = 1;
  }

  message TeacherSubjects {
    // Enrollment ID -> Subject
    map<uint32, Subject> subjects = 1;
  }
}

message NotificationsService {
  message Envelope {
    optional uint64 message_id = 2;

    oneof payload {
      SubjectEnrollmentUpdateSubscriptionRequest subject_enrollment_update_subscription_request = 3;
      SubjectEnrollmentUpdate subject_enrollment_update = 4;
      BulkSubjectEnrollmentUpdate bulk_subject_enrollment_update = 5;
      Acknowledged acknowledged = 6;
      Identify identify = 7;
    }
  }

  // Server acknowledges the client message with the given `message_id`.
  message Acknowledged {}

  message Identify {
    string token = 1;
  }

  // Request to subscribe to updates for specific subjects
  message SubjectEnrollmentUpdateSubscriptionRequest {
    // Enrollment ID -> (subscription data)
    map<uint32, SubjectEnrollmentUpdateSubscription> subscriptions = 1;
  }

  message SubjectEnrollmentUpdateSubscription {
    /**
     * List of subject IDs to subscribe to for updates.
     *
     * The server may limit the number of subjects a client can subscribe to.
     */
    repeated uint32 subject_ids = 1;
  }

  // Sent immediately for important UI updates
  message SubjectEnrollmentUpdate {
    uint32 enrollment_id = 1;
    uint32 subject_id = 2;
    uint32 enrolled_count = 3;
  }

  // Sent every so often for non-important UI updates
  message BulkSubjectEnrollmentUpdate {
    uint32 enrollment_id = 1;
    map<uint32, uint32> subject_enrolled_counts = 2;
  }
}

message Group {
  uint32 id = 1;
  string name = 2;
  GroupType type = 3;
}

message Enrollment {
  uint32 id = 1;
  string name = 2;
  /**
   * Unix timestamp representing the start date of the selection period.
   * If not set, the selection period should be treated as started.
   */
  optional uint64 start_date = 3;
  /**
   * Unix timestamp representing the end date of the selection period.
   * If not set, the selection period should be treated as indefinite.
   */
  optional uint64 end_date = 4;
  optional uint32 group_id = 5;
}

message Subject {
  uint32 id = 1;
  string name = 2;
  optional string description = 3;
  string code = 4;
  SubjectTag tag = 5;
  string location = 6;
  uint32 capacity = 7;
  optional uint32 group_id = 8;
  // Only passed in ListSubjectsResponse and StudentSelections
  repeated User teachers = 9;
  // Only passed in ListSubjectsResponse
  optional uint32 enrolled_count = 10;
  optional string thumbnail_url = 11;
  optional string image_url = 12;
}

message User {
  uint32 id = 1;
  string first_name = 2;
  optional string middle_name = 3;
  optional string last_name = 4;
  UserType type = 5;
  // Mr. Ms. Dr. etc.
  optional string prefix = 6;
  /*
   * All groups (any type) that the user belongs to.
   *
   * Populated for students and teachers. Filter client-side by `Group.type`
   * if you need a specific bucket.
   */
  repeated Group groups = 7;
  optional string avatar_url = 8;
}

enum GroupType {
  CUSTOM = 0;
  GRADE = 1;
  ROOM = 2;
  PROGRAM = 3;
}

enum UserType {
  STUDENT = 0;
  TEACHER = 1;
  ADMIN = 2;
}

enum SubjectTag {
  THAI = 0;
  MATH = 1;
  SCIENCE_AND_TECHNOLOGY = 2;
  SOCIAL_STUDIES = 3;
  ART = 4;
  PHYSICAL_EDUCATION = 5;
  // การงานอาชีพ
  CAREER = 6;
  FOREIGN_LANGUAGE = 7;
  GUIDANCE = 8;
  ENGLISH_PROGRAM = 9;
  // กิจกรรมพัฒนาผู้เรียน
  ACTIVITIES = 10;
}
